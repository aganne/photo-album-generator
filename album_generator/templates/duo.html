<!-- Page Duo — 2 photos côte à côte (symétrie ou contraste) -->
<div class="page">
  <div class="page-bg"></div>
  <div class="band-top"></div>
  <div class="band-bottom"></div>
  <div class="band-bottom-thin"></div>
  <div class="content duo-content">
    {% if page.title %}
    <h3 class="duo-title">{{ page.title }}</h3>
    {% endif %}
    <div class="duo-container">
      {% for photo in page.photos %}
      <div class="duo-photo">
        <img src="{{ photo.path }}" alt="{{ photo.label }}">
        {% if photo.label %}<span class="duo-label">{{ photo.label }}</span>{% endif %}
      </div>
      {% endfor %}
    </div>
  </div>
  <div class="page-number">— {{ page.page_num }} —</div>
</div>
