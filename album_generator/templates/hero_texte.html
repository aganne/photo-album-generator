<!-- Page Hero + Texte -->
<div class="page">
  <div class="page-bg"></div>
  <div class="band-top"></div>
  <div class="band-bottom"></div>
  <div class="content">
    {% if page.photo %}
    <div class="hero-section">
      <img src="{{ page.photo.path }}" alt="{{ page.photo.label }}">
    </div>
    {% endif %}
    <div class="hero-deco-line"></div>
    <div class="hero-text">
      <h2>{{ page.recit.title }}</h2>
      <p class="date-line">{{ page.recit.date }}</p>
      <p>{{ page.recit.text }}</p>
    </div>
  </div>
  <div class="page-number">— {{ page.page_num }} —</div>
</div>
