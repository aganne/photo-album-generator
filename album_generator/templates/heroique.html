<!-- Page Héroïque — 1 photo pleine page, ouverture / moment fort -->
<div class="page heroique-page">
  <div class="heroique-photo">
    {% if page.photo %}
    <img src="{{ page.photo.path }}" alt="{{ page.photo.label }}">
    {% endif %}
  </div>
  {% if page.recit and page.recit.title %}
  <div class="heroique-overlay">
    <h2>{{ page.recit.title }}</h2>
    {% if page.recit.date %}<p class="date-line">{{ page.recit.date }}</p>{% endif %}
  </div>
  {% endif %}
  <div class="page-number heroique-pn">— {{ page.page_num }} —</div>
</div>
