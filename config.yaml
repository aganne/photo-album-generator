# ── Scoring IA ──────────────────────────────────────────────────────────
scoring:
  default_weights:
    smile: 0.25
    sharpness: 0.20
    composition: 0.15
    eyes_open: 0.10
    exposure: 0.10
    faces_count: 0.10
    contrast: 0.05
    noise: 0.05
  dispatch:
    heroique_pct: 7          # % des meilleures photos en pleine page
    duo_pct: 13              # % en duo
    grille_pct: 80           # % en grille dense
  window_size: 40            # Fenêtre glissante pour le dispatch

# ── Extraction vidéo ────────────────────────────────────────────────────
video:
  top_n: 30                  # Nombre max de frames à extraire par vidéo
  min_sharpness: 15.0        # Seuil minimum de netteté
  frame_interval: 0.5        # Intervalle entre deux échantillons (secondes)
  similarity_threshold: 0.92 # Seuil de dédoublonnage
  quality_jpeg: 95           # Qualité de sauvegarde JPEG

# ── Génération PDF ──────────────────────────────────────────────────────
pdf:
  dpi: 300
  page_width_mm: 216.35
  page_height_mm: 302.75
  bleed_mm: 3.175
  safe_margin_mm: 12.7
