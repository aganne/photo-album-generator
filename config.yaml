# ── Configuration de l'Album Photo Generator ────────────────────────────
# Fichier de configuration centralisé pour les services backend.
# Utilisé par : app.py, onedrive_api.py, video_processing.py, db.py

# ── Chemins ─────────────────────────────────────────────────────────────
paths:
  data_dir: "data"              # Données persistantes (SQLite, cache)
  cache_dir: "data/cache"       # Cache local des photos/vidéos téléchargées
  output_dir: "output"          # PDFs générés
  voices_dir: "data/voices"     # Enregistrements vocaux
  frames_dir: "data/frames"     # Frames extraites des vidéos
  fonts_dir: "fonts"            # Polices d'impression

# ── Base de données ─────────────────────────────────────────────────────
database:
  path: "data/albums.db"        # Fichier SQLite
  pool_size: 5

# ── OneDrive ────────────────────────────────────────────────────────────
onedrive:
  client_id: "22c49a22-d89f-42e2-a264-e0a1b3bdd151"   # Azure CLI client ID (public OAuth)
  scopes:
    - "Files.ReadWrite.All"
    - "Files.Read.All"
  token_cache: "~/.config/onedrive/token.json"          # Cache du token MSAL
  base_folder: "Images/Pellicule"                        # Dossier racine des photos
  download_concurrency: 4                                 # Téléchargements parallèles max

# ── Albums (valeurs par défaut) ────────────────────────────────────────
album_defaults:
  palette_name: "Soleil"
  enfant: ""
  year: 2025
  title: "Album Photo"
  subtitle: "Année Mémorable"
  author: "La Famille"

