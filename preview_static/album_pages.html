<!DOCTYPE html>
<html lang="fr">
<head><meta charset=utf-8><title>Album Mael — Preview</title>
<style>
body{margin:0;font-family:Georgia,serif;background:#1a1a1a;padding:10px}
.page{width:210mm;height:297mm;margin:20px auto;position:relative;overflow:hidden;background:#fff;box-shadow:0 0 20px rgba(0,0,0,.3)}
.page-inner{position:absolute;inset:8mm;padding:3mm;display:flex;flex-direction:column}
.tpl-grid{flex:1;display:grid;gap:2mm}
.tpl-cell{background-color:#eee;background-size:cover;background-position:center;cursor:pointer}
.tpl-cell:hover,.t9-cell:hover{outline:2px solid #ff9800}
.page-num{position:absolute;bottom:3mm;left:0;right:0;text-align:center;font-size:8px;color:#ccc}
.t9-page{background:#222}.t9-film{position:absolute;inset:4mm;background:#151515;border-radius:3px;overflow:hidden}
.t9-perf-l,.t9-perf-r{position:absolute;top:0;bottom:0;width:7mm;z-index:10}
.t9-perf-l{left:0}.t9-perf-r{right:0}.t9-perf-l svg,.t9-perf-r svg{width:100%;height:100%}
.t9-frames{position:absolute;left:7mm;right:7mm;top:0;bottom:0;z-index:5}
.t9-grid{position:absolute;inset:2.5mm;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(5,1fr);gap:1mm}
.t9-cell{background-color:#111;background-size:cover;background-position:center;border:.5mm solid #2a2a2a;cursor:pointer}
.t9-label{position:absolute;bottom:5mm;left:0;right:0;text-align:center;color:#555;font-size:7px;z-index:20;letter-spacing:4px}
/* Toolbar */
.toolbar{position:fixed;top:0;left:0;right:0;background:#111;color:#fff;padding:8px 16px;display:flex;align-items:center;gap:12px;z-index:10000;font-size:13px}
.toolbar h1{font-size:16px;margin:0;font-weight:400}
.toolbar a,.toolbar button{padding:6px 14px;border:1px solid #444;background:#222;color:#fff;border-radius:4px;cursor:pointer;font-size:12px;text-decoration:none}
.toolbar .primary{background:#ff9800;border-color:#ff9800;color:#000}
/* Context menu */
.ctx{position:fixed;background:#1a1a1a;border:1px solid #444;border-radius:6px;padding:4px 0;z-index:20000;min-width:180px;box-shadow:0 4px 12px rgba(0,0,0,.6);display:none}
.ctx button{display:block;width:100%;padding:8px 16px;border:none;background:none;color:#ccc;text-align:left;cursor:pointer;font-size:12px}
.ctx button:hover{background:#333;color:#fff}
.ctx .sep{border-top:1px solid #333;margin:4px 0}
.ctx .tag-active{color:#ff9800}
</style></head>
<body>
<div class="toolbar"><h1>📸 Album Mael — Prévisualisation</h1>
<a href="/">← Galerie</a>
<a href="/api/regenerate" class="primary" onclick="return confirm('Regénérer le PDF ?')">📄 Générer PDF</a>
</div><div style="height:46px"></div>
<div id="pages"><p style="color:#888;text-align:center;padding:40px">Chargement des pages...</p></div>

<div class="ctx" id="ctxMenu">
  <button data-tag="hero">⭐ Hero</button>
  <button data-tag="favori">❤️ Favori</button>
  <button data-tag="supprimer">🗑️ Supprimer</button>
  <div class="sep"></div>
  <button data-tag="redater">📅 Redater</button>
  <button data-tag="texte">📝 Texte</button>
  <div class="sep"></div>
  <button onclick="hideCtx()">✕ Fermer</button>
</div>

<script>
let curFile=null;
// Load pages from API
fetch('/api/preview').then(r=>r.json()).then(pages=>{
  if(pages.error){document.getElementById('pages').innerHTML='<p style="color:red">'+pages.error+'</p>';return}
  // Load templates for grid layout
  fetch('/api/photos').then(r=>r.json()).then(photos=>{
    renderPages(pages,photos);
  });
});

function renderPages(pages,photos){
  let container=document.getElementById('pages');
  container.innerHTML='';
  pages.forEach((page,i)=>{
    let div=document.createElement('div');
    div.className='page';
    let inner=document.createElement('div');
    inner.className='page-inner';
    let grid=document.createElement('div');
    grid.className='tpl-grid';
    
    let numPhotos=page.photos.length;
    let cols=numPhotos<=4?2:3;
    if(numPhotos>6)cols=4;
    let rows=Math.ceil(numPhotos/cols);
    grid.style.gridTemplateColumns='repeat('+cols+',1fr)';
    grid.style.gridTemplateRows='repeat('+rows+',1fr)';
    
    page.photos.forEach((p,n)=>{
      let cell=document.createElement('div');
      cell.className='tpl-cell';
      cell.title=p.filename;
      cell.dataset.filename=p.filename;
      cell.style.backgroundImage='url(/api/photo/'+encodeURIComponent(p.filename)+'/thumbnail)';
      cell.addEventListener('click',e=>{
        e.preventDefault();e.stopPropagation();
        curFile=p.filename;
        let ctx=document.getElementById('ctxMenu');
        ctx.style.display='block';ctx.style.left=e.clientX+'px';ctx.style.top=e.clientY+'px';
        fetch('/api/photo/'+encodeURIComponent(curFile)+'/info').then(r=>r.json()).then(d=>{
          let tags=d.tags||{};
          document.querySelectorAll('#ctxMenu button[data-tag]').forEach(b=>{
            if(tags[b.dataset.tag])b.classList.add('tag-active');else b.classList.remove('tag-active')
          });
        }).catch(()=>{});
      });
      grid.appendChild(cell);
    });
    inner.appendChild(grid);
    let num=document.createElement('div');
    num.className='page-num';
    num.textContent='Page '+(i+1)+' · '+page.template_id+(page.is_hero?' ⭐':'');
    div.appendChild(inner);
    div.appendChild(num);
    container.appendChild(div);
  });
  document.querySelector('.toolbar h1').textContent='📸 Album Mael — '+pages.length+' pages';
}

document.querySelectorAll('#ctxMenu button[data-tag]').forEach(b=>{
  b.addEventListener('click',()=>{
    if(!curFile)return;
    fetch('/api/photo/'+encodeURIComponent(curFile)+'/tag',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tag:b.dataset.tag,value:true})
    }).then(()=>hideCtx()).catch(e=>alert('Erreur:'+e));
  });
});
function hideCtx(){document.getElementById('ctxMenu').style.display='none';curFile=null}
document.addEventListener('click',e=>{if(!e.target.closest('.ctx')&&!e.target.closest('.tpl-cell'))hideCtx()});
</script>
</body></html>
